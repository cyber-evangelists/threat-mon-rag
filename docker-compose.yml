networks:
  rag-network:
    driver: bridge

services:
  server:
    build:
      context: .
      dockerfile: docker-files/Dockerfile.server
    ports:
      - "9000:8000"
    networks:
      - rag-network
    hostname: rag-server
    environment:
      - TOKENIZERS_PARALLELISM=false

  client:
    build:
      context: .
      dockerfile: docker-files/Dockerfile.client
    networks:
      - rag-network
    ports:
      - "7890:7860"
    environment:
      - SERVER_HOST=rag-server
      - SERVER_PORT=8000

  qdrant:
    image: qdrant/qdrant:v0.10.1
    ports:
      - "6343:6333"
      - "6344:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - rag-network
    hostname: qdrant

volumes:
  qdrant_storage:
    driver: local
