
networks:
  rag-network:
    driver: bridge

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8000:8000"
    networks:
      - rag-network
    hostname: rag-server

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    networks:
      - rag-network
    ports:
      - "7860:7860"  
    environment:
      - SERVER_HOST=rag-server
      - SERVER_PORT=8000

  qdrant:
    image: qdrant/qdrant:v0.10.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - rag-network
    hostname: qdrant


volumes:
  qdrant_storage:
    driver: local
